<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity 1 — Run the Investigation</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --tt-blue: #009FD9;
    --tt-blue-dark: #007FAE;
    --tt-blue-light: #E6F6FC;
    --tt-dark: #2F3033;
    --tt-darker: #1e2022;
    --tt-green: #2DB783;
    --tt-red: #E64545;
    --tt-amber: #F5A623;
    --tt-bg: #F5F6F8;
    --tt-card: #FFFFFF;
    --tt-border: #E4E7EB;
    --tt-text: #1F2126;
    --tt-text-muted: #6B7280;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: var(--tt-bg);
    color: var(--tt-text);
    line-height: 1.5;
  }

  .top-bar {
    background: var(--tt-dark);
    color: #fff;
    padding: 18px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .top-bar-title {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .progress-dots {
    display: flex;
    gap: 8px;
  }

  .dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .dot.active {
    background: var(--tt-blue);
    color: #fff;
  }

  .dot.completed {
    background: var(--tt-green);
    color: #fff;
  }

  main {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .case-label {
    color: var(--tt-blue);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .case-title {
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 12px;
    line-height: 1.2;
  }

  .case-intro {
    color: var(--tt-text-muted);
    margin-bottom: 28px;
  }

  .evidence-card,
  .step-card {
    background: var(--tt-card);
    border: 1px solid var(--tt-border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .evidence-label {
    color: var(--tt-blue);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .review-photo-wrap {
    position: relative;
    background: #F0F1F3;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 4 / 3;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .review-photo-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .review-photo-wrap .photo-label {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(47, 48, 51, 0.85);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 4px 8px;
    border-radius: 4px;
  }

  .filename-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--tt-blue);
  }

  .filename-icon {
    width: 14px;
    height: 14px;
    color: var(--tt-text-muted);
  }

  .pro-dispute {
    margin-top: 12px;
    padding: 12px 16px;
    border-left: 3px solid var(--tt-blue);
    background: #FAFBFC;
    font-size: 14px;
  }

  .pro-dispute strong {
    font-weight: 700;
  }

  .step-card {
    transition: opacity 0.2s;
  }

  .step-card.locked {
    opacity: 0.55;
    pointer-events: none;
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    user-select: none;
  }

  .step-number {
    width: 38px;
    height: 38px;
    background: var(--tt-blue);
    color: #fff;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
  }

  .step-number.done {
    background: var(--tt-green);
  }

  .step-number.locked-num {
    background: #C5C9CF;
  }

  .step-title-block {
    flex: 1;
  }

  .step-title {
    font-weight: 700;
    font-size: 16px;
    margin: 0;
  }

  .step-subtitle {
    color: var(--tt-text-muted);
    font-size: 13px;
    margin-top: 2px;
  }

  .step-chevron {
    color: var(--tt-text-muted);
    font-size: 14px;
    transition: transform 0.2s;
  }

  .step-card.expanded .step-chevron {
    transform: rotate(180deg);
  }

  .step-body {
    margin-top: 20px;
    display: none;
  }

  .step-card.expanded .step-body {
    display: block;
  }

  .step-body p,
  .step-body .body-text {
    font-size: 14px;
    margin: 0 0 16px;
  }

  .step-body a {
    color: var(--tt-blue);
    text-decoration: underline;
    text-underline-offset: 2px;
    font-weight: 600;
  }

  .step-body a:hover {
    color: var(--tt-blue-dark);
  }

  /* Buttons rendered as anchors still need button styling, not link styling */
  .step-body a.btn {
    color: #fff;
    text-decoration: none;
  }

  .step-body a.btn:hover {
    color: #fff;
  }

  .inspect-image-wrap {
    background: #F0F1F3;
    border-radius: 8px;
    aspect-ratio: 4 / 3;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .inspect-image-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .question {
    font-weight: 600;
    margin: 16px 0 12px;
    font-size: 14px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 1px solid var(--tt-border);
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
  }

  .option:hover {
    border-color: var(--tt-blue);
    background: var(--tt-blue-light);
  }

  .option.selected {
    border-color: var(--tt-blue);
    background: var(--tt-blue-light);
  }

  .option input[type="radio"] {
    margin: 2px 0 0;
    accent-color: var(--tt-blue);
    flex-shrink: 0;
  }

  .option.disabled {
    pointer-events: none;
    opacity: 0.7;
  }

  .option.correct-revealed {
    border-color: var(--tt-green);
    background: #E8F8F2;
  }

  .option.incorrect-revealed {
    border-color: var(--tt-red);
    background: #FCEBEB;
  }

  .feedback {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }

  .feedback.show { display: block; }

  .feedback.correct {
    background: #E8F8F2;
    border-left: 3px solid var(--tt-green);
  }

  .feedback.incorrect {
    background: #FCEBEB;
    border-left: 3px solid var(--tt-red);
  }

  .btn {
    background: var(--tt-blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.15s;
  }

  .btn:hover { background: var(--tt-blue-dark); }
  .btn:disabled {
    background: #C5C9CF;
    cursor: not-allowed;
  }

  .btn-secondary {
    background: transparent;
    color: var(--tt-blue);
    border: 1px solid var(--tt-blue);
  }

  .btn-secondary:hover {
    background: var(--tt-blue-light);
  }

  /* Filename display box */
  .filename-box {
    background: var(--tt-darker);
    color: #fff;
    padding: 14px 18px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    margin-bottom: 16px;
  }

  .filename-box .label-text { color: #C5C9CF; }
  .filename-box .filename-value { color: #F5A623; font-weight: 600; }
  .filename-box .filename-keyword { color: var(--tt-red); font-weight: 600; }

  /* "Try it yourself" download panel */
  .try-it {
    background: var(--tt-blue-light);
    border-radius: 8px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }

  .try-it h4 {
    margin: 0 0 10px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .try-it-platforms {
    display: flex;
    gap: 0;
    margin: 14px 0 10px;
    border-bottom: 1px solid var(--tt-border);
  }

  .platform-tab {
    padding: 8px 16px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--tt-text-muted);
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    font-size: 13px;
    margin-bottom: -1px;
  }

  .platform-tab.active {
    color: var(--tt-dark);
    border-bottom-color: var(--tt-dark);
  }

  .platform-instructions {
    display: none;
    font-size: 14px;
    padding: 12px 4px 4px;
  }

  .platform-instructions.active { display: block; }

  .platform-instructions ol {
    padding-left: 18px;
    margin: 0;
  }

  .platform-instructions li {
    margin-bottom: 4px;
  }

  /* Yellow note callout */
  .note-callout {
    background: #FEF6E0;
    border-left: 3px solid var(--tt-amber);
    padding: 14px 16px;
    border-radius: 6px;
    margin: 16px 0;
    font-size: 13.5px;
  }

  .note-callout strong { font-weight: 700; }

  /* Simulated metadata / tool response panel */
  .sim-panel {
    background: var(--tt-darker);
    color: #fff;
    padding: 18px 22px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    margin: 12px 0 16px;
  }

  .sim-panel-label {
    color: var(--tt-blue);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'Montserrat', sans-serif;
  }

  .sim-panel .field-label { color: #9AA1AB; }
  .sim-panel .field-value { color: #fff; }
  .sim-panel .red-callout { color: #FF8A8A; font-weight: 500; }
  .sim-panel .url-value { color: #FF8A8A; font-weight: 500; }

  /* Tool example response (Gemini / Content Credentials) */
  .tool-response {
    background: var(--tt-darker);
    color: #fff;
    padding: 20px 24px;
    border-radius: 8px;
    margin: 12px 0 16px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }

  .tool-response-label {
    color: var(--tt-blue);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .tool-response p { margin: 0 0 10px; }
  .tool-response ul { margin: 8px 0; padding-left: 22px; }
  .tool-response li { color: #FF8A8A; margin-bottom: 4px; }

  .tool-response .neutral-text { color: #fff; }
  .tool-response .quiet-text { color: #C5C9CF; }
  .tool-response a { color: var(--tt-blue); text-decoration: none; }

  /* Tool tabs (Gemini vs Content Credentials) */
  .tool-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--tt-border);
  }

  .tool-tab {
    padding: 10px 20px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--tt-text-muted);
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    font-size: 13px;
    margin-bottom: -1px;
  }

  .tool-tab.active {
    color: var(--tt-dark);
    border-bottom-color: var(--tt-blue);
  }

  .tool-panel {
    display: none;
  }

  .tool-panel.active { display: block; }

  /* Decision section */
  .decision-card {
    background: var(--tt-card);
    border: 1px solid var(--tt-border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 16px;
  }

  .decision-card h3 {
    margin: 0 0 12px;
    font-size: 20px;
    font-weight: 700;
  }

  .decision-card .summary-list {
    margin: 16px 0 24px;
    padding-left: 22px;
    font-size: 14px;
  }

  .decision-card .summary-list li {
    margin-bottom: 6px;
  }

  .decision-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
  }

  .decision-option {
    padding: 18px;
    border: 2px solid var(--tt-border);
    border-radius: 8px;
    background: var(--tt-card);
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    font-size: 16px;
    color: var(--tt-text);
    transition: all 0.15s;
  }

  .decision-option:hover {
    border-color: var(--tt-blue);
    background: var(--tt-blue-light);
  }

  .decision-option.selected {
    border-color: var(--tt-blue);
    background: var(--tt-blue-light);
  }

  /* Reveal panel */
  .reveal {
    background: linear-gradient(135deg, #FAFBFC 0%, #F0F4F7 100%);
    border: 1px solid var(--tt-border);
    border-radius: 12px;
    padding: 32px;
    margin-top: 16px;
  }

  .reveal-status {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .reveal-status.correct {
    background: var(--tt-green);
    color: #fff;
  }

  .reveal-status.incorrect {
    background: var(--tt-red);
    color: #fff;
  }

  .reveal h3 {
    margin: 0 0 12px;
    font-size: 22px;
    font-weight: 700;
  }

  .reveal-explainer {
    font-size: 15px;
    margin-bottom: 20px;
  }

  .signals-summary {
    background: #fff;
    border-radius: 10px;
    padding: 18px 22px;
    margin: 20px 0;
    border: 1px solid var(--tt-border);
  }

  .signals-summary h4 {
    margin: 0 0 12px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--tt-text-muted);
  }

  .signal-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid #F0F1F3;
    font-size: 14px;
  }

  .signal-row:last-child { border-bottom: none; }

  .signal-marker {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--tt-green);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .signal-marker.silent {
    background: #C5C9CF;
  }

  .signal-row .signal-label {
    font-weight: 600;
    margin-right: 4px;
  }

  /* Manager comment block */
  .manager-comment {
    background: #fff;
    border: 1px dashed var(--tt-blue);
    border-radius: 8px;
    padding: 16px 20px;
    margin: 20px 0;
    font-size: 14px;
    font-style: italic;
    color: var(--tt-text);
  }

  .manager-comment .mc-label {
    font-style: normal;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--tt-blue);
    margin-bottom: 6px;
    display: block;
  }

  /* Final completion screen */
  .complete-screen {
    text-align: center;
    padding: 60px 20px;
  }

  .complete-screen h2 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .complete-screen p {
    color: var(--tt-text-muted);
    max-width: 520px;
    margin: 0 auto 24px;
  }

  /* SVG text screenshot styling — basic mobile messages frame */
  .msg-screenshot {
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
    display: block;
  }

  @media (max-width: 600px) {
    .top-bar { padding: 14px 18px; }
    .top-bar-title { font-size: 12px; }
    main { padding: 24px 16px 60px; }
    .case-title { font-size: 22px; }
    .decision-options { grid-template-columns: 1fr; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header class="top-bar">
  <div class="top-bar-title">Activity 1 — Run the Investigation</div>
  <div class="progress-dots">
    <div class="dot active" data-dot="1">1</div>
    <div class="dot" data-dot="2">2</div>
    <div class="dot" data-dot="3">3</div>
  </div>
</header>

<main id="main"></main>

        { step: "Step 1 — Visual", status: "silent", text: "Consistent formatting, realistic iOS timestamps, no anomalies." },
        { step: "Step 2 — Filename", status: "silent", text: "Generic name, no AI keywords." },
        { step: "Step 3 — Metadata", status: "silent", text: "Empty — expected for a screenshot." },
        { step: "Step 4 — Technical Tools", status: "silent", text: "No SynthID, no C2PA — expected for screenshots." }
      ],
      managerCommentLabel: "Action taken",
      managerComment: "Review left up. No Manager Comment is required — these are only written when a review is removed. Document your investigation findings internally if needed."
    }
  }
];

// ===== APP STATE & LOGIC =====
let currentCaseIdx = 0;
const caseProgress = {}; // { caseIdx: { stepIdx: 'done', decision: 'done' } }

function renderCurrentCase() {
  const c = CASES[currentCaseIdx];
  caseProgress[currentCaseIdx] = caseProgress[currentCaseIdx] || { steps: {}, decisionMade: false, complete: false };
  const main = document.getElementById('main');
  main.innerHTML = '';
  main.scrollIntoView({ behavior: 'instant', block: 'start' });
  window.scrollTo(0, 0);

  // Header
  const header = document.createElement('div');
  header.innerHTML = `
    <div class="case-label">${c.label}</div>
    <h1 class="case-title">${c.title}</h1>
    <p class="case-intro">${c.intro}</p>
  `;
  main.appendChild(header);

  // Evidence card
  const ev = document.createElement('div');
  ev.className = 'evidence-card';
  const imageMarkup = c.imageType === 'photo'
    ? `<img src="${c.imageData}" alt="Review photo">`
    : (c.imageData === 'MSG_FAKE' ? MSG_FAKE : MSG_CLEAN);
  ev.innerHTML = `
    <div class="evidence-label">Review Evidence</div>
    <div class="review-photo-wrap">
      <span class="photo-label">REVIEW PHOTO</span>
      ${imageMarkup}
    </div>
    <div class="filename-line">
      <svg class="filename-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M9.293 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.707A1 1 0 0 0 13.707 4L10 .293A1 1 0 0 0 9.293 0zM9.5 3.5v-2l3 3h-2a1 1 0 0 1-1-1z"/></svg>
      ${c.filename}
    </div>
    <div class="pro-dispute"><strong>Pro's dispute:</strong> "${c.dispute}"</div>
  `;
  main.appendChild(ev);

  // Steps
  c.steps.forEach((step, idx) => {
    const stepCard = renderStep(step, idx);
    main.appendChild(stepCard);
  });

  // Decision card (hidden until all steps done)
  const decision = document.createElement('div');
  decision.id = 'decision-section';
  decision.className = 'hidden';
  main.appendChild(decision);

  // Reveal card (hidden until decision made)
  const reveal = document.createElement('div');
  reveal.id = 'reveal-section';
  reveal.className = 'hidden';
  main.appendChild(reveal);

  // Restore step states if user is returning
  Object.keys(caseProgress[currentCaseIdx].steps).forEach(idx => {
    const stepIdx = parseInt(idx);
    const savedState = caseProgress[currentCaseIdx].steps[stepIdx];
    if (savedState && savedState.done) {
      // We don't re-restore — fresh state on case render
    }
  });

  updateLockStates();
}

function renderStep(step, stepIdx) {
  const card = document.createElement('div');
  card.className = 'step-card';
  card.dataset.stepIdx = stepIdx;
  if (stepIdx > 0) card.classList.add('locked');

  // Header
  const headerEl = document.createElement('div');
  headerEl.className = 'step-header';
  headerEl.innerHTML = `
    <div class="step-number ${stepIdx > 0 ? 'locked-num' : ''}">${stepIdx + 1}</div>
    <div class="step-title-block">
      <h3 class="step-title">${step.title}</h3>
      <div class="step-subtitle">${step.subtitle}</div>
    </div>
    <div class="step-chevron">▾</div>
  `;
  headerEl.addEventListener('click', () => {
    if (card.classList.contains('locked')) return;
    card.classList.toggle('expanded');
  });
  card.appendChild(headerEl);

  // Body — always present, hidden via CSS
  const body = document.createElement('div');
  body.className = 'step-body';
  body.appendChild(renderStepBody(step, stepIdx));
  card.appendChild(body);

  // Auto-expand first step
  if (stepIdx === 0) card.classList.add('expanded');

  return card;
}

function renderStepBody(step, stepIdx) {
  const wrap = document.createElement('div');
  const c = CASES[currentCaseIdx];

  if (step.bodyType === 'image-question') {
    const imgWrap = document.createElement('div');
    imgWrap.className = 'inspect-image-wrap';
    imgWrap.innerHTML = c.imageType === 'photo'
      ? `<img src="${c.imageData}" alt="">`
      : (c.imageData === 'MSG_FAKE' ? MSG_FAKE : MSG_CLEAN);
    wrap.appendChild(imgWrap);
  }

  if (step.bodyType === 'filename-question') {
    const box = document.createElement('div');
    box.className = 'filename-box';
    let fname = step.filenameBox;
    if (step.filenameHighlight) {
      fname = fname.replace(step.filenameHighlight, `<span class="filename-keyword">${step.filenameHighlight}</span>`);
      // wrap the rest
      box.innerHTML = `<span class="label-text">Filename: </span><span class="filename-value">${fname}</span>`;
    } else {
      box.innerHTML = `<span class="label-text">Filename: </span><span class="filename-value">${fname}</span>`;
    }
    wrap.appendChild(box);
  }

  if (step.bodyType === 'metadata-question') {
    // Try it yourself panel
    const tryIt = document.createElement('div');
    tryIt.className = 'try-it';
    const isReal = step.downloadHref !== null;
    tryIt.innerHTML = `
      <h4>⬇ Try it yourself</h4>
      <p style="margin:0 0 6px;font-size:13.5px;">${isReal ? `Download this image and check its metadata on your own machine. The file will save as <strong>${step.downloadName}</strong>.` : `For this exercise, review the example panel below. The instructions show what you'd do on a real case.`}</p>
      <div class="try-it-platforms">
        <button class="platform-tab active" data-platform="mac">Mac</button>
        <button class="platform-tab" data-platform="win">Windows</button>
      </div>
      <div class="platform-instructions active" data-platform="mac">
        <ol>${step.macInstructions.map(s => `<li>${s}</li>`).join('')}</ol>
      </div>
      <div class="platform-instructions" data-platform="win">
        <ol>${step.winInstructions.map(s => `<li>${s}</li>`).join('')}</ol>
      </div>
      ${isReal ? `<a href="${step.downloadHref}" download="${step.downloadName}" class="btn" style="display:inline-block;text-decoration:none;margin-top:14px;">${step.downloadLabel}</a>` : `<div style="font-size:13px;color:var(--tt-text-muted);margin-top:10px;font-style:italic;">${step.downloadLabel}</div>`}
    `;
    // wire up tabs
    setTimeout(() => {
      tryIt.querySelectorAll('.platform-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          tryIt.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
          tryIt.querySelectorAll('.platform-instructions').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          tryIt.querySelector(`.platform-instructions[data-platform="${tab.dataset.platform}"]`).classList.add('active');
        });
      });
    }, 0);
    wrap.appendChild(tryIt);

    // Yellow note
    const note = document.createElement('div');
    note.className = 'note-callout';
    note.innerHTML = `<strong>Note:</strong> ${step.note}`;
    wrap.appendChild(note);

    // Example panel header
    const exHead = document.createElement('p');
    exHead.style.fontWeight = '600';
    exHead.style.fontSize = '14px';
    exHead.style.margin = '20px 0 8px';
    exHead.innerHTML = 'Example of the metadata panel:';
    wrap.appendChild(exHead);

    // Sim panel
    const sim = document.createElement('div');
    sim.className = 'sim-panel';
    let simHTML = `<div class="sim-panel-label">${step.simPanelLabel}</div>`;
    step.simPanelLines.forEach(line => {
      const valClass = line.red ? 'url-value' : (line.muted ? 'field-label' : 'field-value');
      simHTML += `<div><span class="field-label">${line.label}</span><span class="${valClass}">${line.value}</span></div>`;
    });
    simHTML += `<div style="margin-top:10px;" class="red-callout">${step.simPanelFooter}</div>`;
    sim.innerHTML = simHTML;
    wrap.appendChild(sim);
  }

  if (step.bodyType === 'tools-question') {
    const intro = document.createElement('p');
    intro.className = 'body-text';
    intro.innerHTML = step.intro;
    wrap.appendChild(intro);

    // Tool tabs
    const tabs = document.createElement('div');
    tabs.className = 'tool-tabs';
    step.toolPanels.forEach((panel, i) => {
      const tab = document.createElement('button');
      tab.className = 'tool-tab' + (i === 0 ? ' active' : '');
      tab.textContent = panel.tabLabel;
      tab.dataset.toolIdx = i;
      tabs.appendChild(tab);
    });
    wrap.appendChild(tabs);

    // Tool panels
    const panelWrap = document.createElement('div');
    step.toolPanels.forEach((panel, i) => {
      const p = document.createElement('div');
      p.className = 'tool-panel' + (i === 0 ? ' active' : '');
      p.dataset.toolIdx = i;
      let inner = `<div class="tool-response"><div class="tool-response-label">${panel.panelLabel}</div>`;
      panel.content.forEach(item => {
        if (typeof item === 'string') {
          inner += `<p>${item}</p>`;
        } else if (item.type === 'list') {
          inner += '<ul>' + item.items.map(li => `<li>${li}</li>`).join('') + '</ul>';
        } else if (item.type === 'list-neutral') {
          inner += '<ul style="list-style:disc;">' + item.items.map(li => `<li style="color:#fff;">${li}</li>`).join('') + '</ul>';
        }
      });
      inner += `</div>`;
      p.innerHTML = inner;
      panelWrap.appendChild(p);
    });
    wrap.appendChild(panelWrap);

    setTimeout(() => {
      tabs.querySelectorAll('.tool-tab').forEach(t => {
        t.addEventListener('click', () => {
          tabs.querySelectorAll('.tool-tab').forEach(x => x.classList.remove('active'));
          panelWrap.querySelectorAll('.tool-panel').forEach(x => x.classList.remove('active'));
          t.classList.add('active');
          panelWrap.querySelector(`.tool-panel[data-tool-idx="${t.dataset.toolIdx}"]`).classList.add('active');
        });
      });
    }, 0);
  }

  // Question + options
  const q = document.createElement('div');
  q.className = 'question';
  q.textContent = step.question;
  wrap.appendChild(q);

  const optsWrap = document.createElement('div');
  step.options.forEach((opt, optIdx) => {
    const optEl = document.createElement('label');
    optEl.className = 'option';
    optEl.dataset.optionIdx = optIdx;
    optEl.innerHTML = `
      <input type="radio" name="step-${stepIdx}" value="${optIdx}">
      <span>${opt.text}</span>
    `;
    optsWrap.appendChild(optEl);
  });
  wrap.appendChild(optsWrap);

  // Feedback area
  const feedback = document.createElement('div');
  feedback.className = 'feedback';
  feedback.dataset.feedbackStep = stepIdx;
  wrap.appendChild(feedback);

  // Confirm button
  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.textContent = 'Confirm finding';
  btn.disabled = true;
  btn.addEventListener('click', () => handleStepConfirm(stepIdx));
  wrap.appendChild(btn);

  // Wire option selection
  optsWrap.querySelectorAll('input[type="radio"]').forEach(r => {
    r.addEventListener('change', () => {
      optsWrap.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      r.closest('.option').classList.add('selected');
      btn.disabled = false;
    });
  });

  return wrap;
}

function handleStepConfirm(stepIdx) {
  const c = CASES[currentCaseIdx];
  const step = c.steps[stepIdx];
  const card = document.querySelector(`.step-card[data-step-idx="${stepIdx}"]`);
  const selected = card.querySelector('input[type="radio"]:checked');
  if (!selected) return;
  const optIdx = parseInt(selected.value);
  const isCorrect = step.options[optIdx].correct;

  // Show feedback
  const feedback = card.querySelector('.feedback');
  feedback.classList.remove('correct', 'incorrect');
  feedback.classList.add(isCorrect ? 'correct' : 'incorrect', 'show');
  feedback.textContent = step.options[optIdx].feedback;

  // Mark options
  const opts = card.querySelectorAll('.option');
  opts.forEach((o, i) => {
    o.classList.add('disabled');
    if (step.options[i].correct) o.classList.add('correct-revealed');
    if (i === optIdx && !isCorrect) o.classList.add('incorrect-revealed');
  });
  card.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
  card.querySelector('.btn').style.display = 'none';

  if (isCorrect) {
    // Mark step done
    caseProgress[currentCaseIdx].steps[stepIdx] = { done: true };
    card.querySelector('.step-number').classList.remove('locked-num');
    card.querySelector('.step-number').classList.add('done');
    // Unlock next step
    if (stepIdx + 1 < c.steps.length) {
      const next = document.querySelector(`.step-card[data-step-idx="${stepIdx + 1}"]`);
      next.classList.remove('locked');
      next.querySelector('.step-number').classList.remove('locked-num');
      next.classList.add('expanded');
      // Scroll to next
      setTimeout(() => next.scrollIntoView({ behavior: 'smooth', block: 'start' }), 250);
    } else {
      // All steps done — show decision
      showDecision();
    }
  } else {
    // Allow retry — reset after feedback shown
    setTimeout(() => {
      feedback.classList.remove('show');
      opts.forEach((o) => {
        o.classList.remove('disabled', 'correct-revealed', 'incorrect-revealed', 'selected');
      });
      card.querySelectorAll('input[type="radio"]').forEach(r => { r.disabled = false; r.checked = false; });
      const btn = card.querySelector('.btn');
      btn.style.display = '';
      btn.disabled = true;
    }, 5000);
  }
}

function showDecision() {
  const c = CASES[currentCaseIdx];
  const section = document.getElementById('decision-section');
  section.classList.remove('hidden');
  section.innerHTML = `
    <div class="decision-card">
      <h3>Make your decision</h3>
      <p>${c.decisionPrompt}</p>
      <div class="decision-options">
        ${c.decisionOptions.map((opt, i) => `<button class="decision-option" data-dec="${i}">${opt.label}</button>`).join('')}
      </div>
      <div class="feedback" id="decision-feedback"></div>
    </div>
  `;
  section.querySelectorAll('.decision-option').forEach(btn => {
    btn.addEventListener('click', () => handleDecision(parseInt(btn.dataset.dec)));
  });
  setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);
}

function handleDecision(decIdx) {
  const c = CASES[currentCaseIdx];
  const isCorrect = c.decisionOptions[decIdx].correct;
  const section = document.getElementById('decision-section');
  section.querySelectorAll('.decision-option').forEach((btn, i) => {
    btn.disabled = true;
    if (i === decIdx) btn.classList.add('selected');
  });

  if (!isCorrect) {
    const fb = document.getElementById('decision-feedback');
    fb.classList.add('incorrect', 'show');
    fb.textContent = c.decisionWrongFeedback;
    setTimeout(() => {
      fb.classList.remove('show', 'incorrect');
      section.querySelectorAll('.decision-option').forEach((btn) => {
        btn.disabled = false;
        btn.classList.remove('selected');
      });
    }, 6000);
    return;
  }

  // Correct — show reveal
  caseProgress[currentCaseIdx].decisionMade = true;
  showReveal();
}

function showReveal() {
  const c = CASES[currentCaseIdx];
  const section = document.getElementById('reveal-section');
  section.classList.remove('hidden');
  const reveal = c.reveal;
  const signalsHTML = reveal.signals.map(s => `
    <div class="signal-row">
      <div class="signal-marker ${s.status === 'silent' ? 'silent' : ''}">${s.status === 'silent' ? '–' : '✓'}</div>
      <div><span class="signal-label">${s.step}:</span> ${s.text}</div>
    </div>
  `).join('');
  const isLast = currentCaseIdx === CASES.length - 1;
  section.innerHTML = `
    <div class="reveal">
      <div class="reveal-status correct">Correct decision</div>
      <h3>${reveal.title}</h3>
      <p class="reveal-explainer">${reveal.explainer}</p>
      <div class="signals-summary">
        <h4>Signal summary</h4>
        ${signalsHTML}
      </div>
      <div class="manager-comment">
        <span class="mc-label">${reveal.managerCommentLabel || 'Example Manager Comment'}</span>
        ${reveal.managerComment}
      </div>
      <button class="btn" id="next-case-btn">${isLast ? 'Finish Activity 1' : 'Next case →'}</button>
    </div>
  `;
  document.getElementById('next-case-btn').addEventListener('click', advanceCase);
  setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);

  // Update dot
  updateDots();
}

function advanceCase() {
  caseProgress[currentCaseIdx].complete = true;
  if (currentCaseIdx < CASES.length - 1) {
    currentCaseIdx++;
    updateDots();
    renderCurrentCase();
  } else {
    showComplete();
  }
}

function showComplete() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="complete-screen">
      <div style="font-size:64px;line-height:1;margin-bottom:20px;">✓</div>
      <h2>Activity 1 complete</h2>
      <p>You ran the full four-step investigation across three cases: a confident removal, a judgment-call removal on a screenshot, and a discipline case where the investigation found nothing.</p>
      <p>The same flow applies to every suspected fake-image case in your queue. When you have evidence at every step, document it and remove. When screenshots strip your technical evidence, lean on visible signals and the KA's judgment-call provision. When the investigation honestly finds nothing — leave the review up.</p>
      <button class="btn" onclick="restartActivity()">Restart activity</button>
    </div>
  `;
  // Mark all dots completed
  document.querySelectorAll('.dot').forEach(d => {
    d.classList.remove('active');
    d.classList.add('completed');
  });
  window.scrollTo(0, 0);
}

function restartActivity() {
  currentCaseIdx = 0;
  for (const k in caseProgress) delete caseProgress[k];
  updateDots();
  renderCurrentCase();
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.remove('active', 'completed');
    if (i < currentCaseIdx || (caseProgress[i] && caseProgress[i].complete)) {
      d.classList.add('completed');
    } else if (i === currentCaseIdx) {
      d.classList.add('active');
    }
  });
}

function updateLockStates() {
  // Lock all steps after the first unfinished one
  const c = CASES[currentCaseIdx];
  let foundUnfinished = false;
  for (let i = 0; i < c.steps.length; i++) {
    const card = document.querySelector(`.step-card[data-step-idx="${i}"]`);
    if (!card) continue;
    const isDone = caseProgress[currentCaseIdx]?.steps[i]?.done;
    if (isDone) {
      card.classList.remove('locked');
    } else if (!foundUnfinished) {
      card.classList.remove('locked');
      foundUnfinished = true;
    } else {
      card.classList.add('locked');
    }
  }
}

// Initial render
renderCurrentCase();

</script>

</body>
</html>
